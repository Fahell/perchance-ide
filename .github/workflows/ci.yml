name: CI

on:
  push:
    branches-ignore:
      - dist  # Auto-update dist on every push to any branch except dist itself
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_typecheck:
        description: "Run `tsc --noEmit` type check"
        type: boolean
        default: true
      run_test:
        description: "Run vitest test suite"
        type: boolean
        default: true
      run_build:
        description: "Run esbuild bundle -> dist/agent.js artifact"
        type: boolean
        default: false
      run_update_cdn:
        description: "Build dist/agent.js and publish to `dist` branch on remote (force-push, replaces last deploy)."
        type: boolean
        default: false

# Workflow-level concurrency: cancel stale typecheck/test/build runs on the same ref
# (the `update-cdn` job overrides this with its own job-level concurrency group)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_typecheck == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_test == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm exec vitest run

  build:
    name: Build (artifact)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bundle
        run: node ./esbuild.config.mjs

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent.js
          path: dist/agent.js
          if-no-files-found: error

  update-cdn:
    name: Update CDN (dist branch)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [typecheck, test]
    permissions:
      contents: write
    # Triggers:
    #  - on push to any branch (workflow-level `branches-ignore: [dist]` filters out dist itself)
    #  - on manual workflow_dispatch with run_update_cdn=true
    #  - NOT on pull_request (forks can't push; PRs that merge will trigger a push event anyway)
    if: "${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_update_cdn == 'true') }}"
    # Job-level concurrency overrides workflow-level: serializes ALL writes to dist
    # across all branches into a single global queue (last-write-wins safe).
    concurrency:
      group: update-cdn-dist
      cancel-in-progress: false
    steps:
      - name: Checkout (source branch)
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dist/agent.js
        run: |
          set -e -o pipefail
          VERSION=$(node -e "console.log(require('./package.json').version)")
          : "${VERSION:?required: package.json version is empty}"
          echo "📦 Version: ${VERSION}"

          SRC_SHA=$(git rev-parse --short HEAD)
          echo "📦 Source SHA: ${SRC_SHA}"

          echo "🔨 Building..."
          COMMIT=${SRC_SHA} node ./esbuild.config.mjs

          if [ ! -f dist/agent.js ]; then
            echo "❌ dist/agent.js missing — build failed"
            exit 1
          fi
          echo "📦 Built dist/agent.js ($(stat -c %s dist/agent.js) bytes)"

      - name: Configure git bot identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish to dist branch (two-commit, never amend)
        run: |
          set -e -o pipefail
          SRC_SHA=$(git rev-parse --short HEAD)
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "📦 Source: ${SRC_SHA}, Version: ${VERSION}"

          # Create an orphan branch: HEAD points at unborn dist-temp with no commits.
          # Working tree is preserved (so dist/agent.js stays); index is reset to empty.
          git checkout --orphan dist-temp

          # Defensive: some git versions may keep tracked-source files in the index
          # from before the orphan switch. Force-remove them from the index only.
          git rm -rf --cached --ignore-unmatch . 2>/dev/null || true

          # Commit 1 (H1): dist/agent.js only.
          # Use -f to bypass .gitignore (dist/ is normally git-ignored on source branches).
          git add -f dist/agent.js
          if git diff --cached --quiet; then
            echo "❌ dist/agent.js not staged — bug"
            exit 1
          fi
          git commit -m "cdn: deploy v${VERSION} (source: ${SRC_SHA})"

          HASH_FULL=$(git rev-parse HEAD)
          HASH_SHORT=$(git rev-parse --short HEAD)
          echo "📦 H1 (dist/agent.js commit): ${HASH_SHORT}"

          # Generate IMPORT.md pointing to H1.
          # Two-commit design: H2 below adds IMPORT.md as a CHILD of H1.
          # That keeps H1 permanently reachable as an ancestor of dist's HEAD,
          # so it's immune to GitHub GC (which would otherwise orphan-and-purge
          # a pre-amend hash and break jsDelivr caching forever).
          IMPORT_URL="https://cdn.jsdelivr.net/gh/Fahell/perchance-ide@${HASH_FULL}/dist/agent.js"

          {
            echo "# Import URL"
            echo ""
            echo "Add an HTML panel to your generator with:"
            echo ""
            echo '```html'
            echo '<script>'
            echo "  import(\"${IMPORT_URL}\");"
            echo '</script>'
            echo '```'
            echo ""
            echo "Also add \`agentAi = {import:ai-text-plugin}\` to your list panel."
          } > IMPORT.md

          if [ ! -f IMPORT.md ]; then
            echo "❌ IMPORT.md not generated"
            exit 1
          fi
          echo "📄 Generated IMPORT.md (refs @${HASH_SHORT})"

          # Commit 2 (H2): IMPORT.md only.
          git add IMPORT.md
          git commit -m "docs: sync IMPORT.md → ${HASH_SHORT}"

          echo "✅ dist branch ready. Last 2 commits:"
          git --no-pager log --oneline -2

          echo "🚀 Pushing to dist..."
          # Force-overwrite dist on remote. The update-cdn-dist concurrency group
          # guarantees no two runs race on this command.
          git push --force origin HEAD:dist

          echo "✅ Done. New dist HEAD: $(git rev-parse --short HEAD)"
